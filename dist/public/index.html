<!DOCTYPE html>
<html lang="en-AU">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>PantryShare AU — Community Food Sharing by Suburb</title>
    <meta name="description" content="Share, swap, or request food with households in your suburb or postcode. Community food resilience for Australians." />

    <!-- Open Graph -->
    <meta property="og:title" content="PantryShare AU" />
    <meta property="og:description" content="Share, swap or request food with your neighbours. Community resilience, suburb by suburb." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pantryshare.com.au" />
    <meta property="og:image" content="https://pantryshare.com.au/icons/icon-512.png" />

    <!-- Fonts: Cabinet Grotesk (headings) + General Sans (body) from Fontshare -->
    <link
      href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&f[]=general-sans@400,500,600&display=swap"
      rel="stylesheet"
    />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme colour — matches army green brand -->
    <meta name="theme-color" content="#2e3822" />
    <meta name="msapplication-TileColor" content="#2e3822" />
    <meta name="msapplication-TileImage" content="/icons/icon-144.png" />

    <!-- iOS PWA — makes it feel like a native app on iPhone/iPad -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PantryShare" />

    <!-- iOS touch icons (Apple ignores manifest icons — these are required separately) -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-96.png" />

    <!-- App CSS + JS (Vite build output) -->
    <script type="module" crossorigin src="./assets/index-BkMZQ3i5.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-C2i6SLit.css">
  
    <link rel="canonical" href="https://pantryshare.com.au/" />
    <meta name="robots" content="index, follow" />
    <meta property="og:url" content="https://pantryshare.com.au/" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "Organization",
      "@id": "https://pantryshare.com.au/#organization",
      "name": "PantryShare AU",
      "url": "https://pantryshare.com.au",
      "logo": "https://pantryshare.com.au/icons/icon-512.png",
      "description": "PantryShare AU is a community food sharing app connecting Australian households by suburb and postcode. Share, swap or request food — free to use, built for community resilience.",
      "parentOrganization": {
        "@type": "Organization",
        "name": "Famine & Feast AU",
        "url": "https://famineandfeast.com.au"
      }
    },
    {
      "@type": "WebApplication",
      "@id": "https://pantryshare.com.au/#app",
      "name": "PantryShare AU",
      "url": "https://pantryshare.com.au",
      "description": "Community food sharing by suburb and postcode. Post food to share or swap, browse local listings, or request food you need — suburb by suburb across Australia.",
      "applicationCategory": "LifestyleApplication",
      "operatingSystem": "Web, iOS, Android",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "AUD",
        "description": "Free to use. App Store launch planned at 0.99 AUD."
      },
      "publisher": {"@id": "https://pantryshare.com.au/#organization"},
      "inLanguage": "en-AU",
      "countryOfOrigin": "AU"
    },
    {
      "@type": "WebSite",
      "@id": "https://pantryshare.com.au/#website",
      "url": "https://pantryshare.com.au",
      "name": "PantryShare AU",
      "publisher": {"@id": "https://pantryshare.com.au/#organization"},
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://pantryshare.com.au/#/?postcode={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
  ]
}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Register service worker for PWA offline support + home screen install
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.warn('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
