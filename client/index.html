<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PantryShare AU — Community Food Sharing by Suburb</title>
    <meta name="description" content="Share, swap, or request food with households in your suburb or postcode. Community food resilience for Australians." />
    <meta property="og:title" content="PantryShare AU" />
    <meta property="og:description" content="Share, swap or request food with your neighbours. Community resilience, suburb by suburb." />
    <meta property="og:type" content="website" />
    <!-- Fonts: Cabinet Grotesk (headings) + General Sans (body) from Fontshare -->
    <link
      href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&f[]=general-sans@400,500,600&display=swap"
      rel="stylesheet"
    />
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#3d5c35" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PantryShare" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
